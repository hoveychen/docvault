# Local dev infrastructure for docvault: Postgres (metadata + job queue) and MinIO (object storage).
# App server/worker run on the host (go run ./cmd/...) and talk to these over localhost.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docvault
      POSTGRES_PASSWORD: docvault
      POSTGRES_DB: docvault
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docvault"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
  minio-data:
