# Muvee compose deployment for docvault.
#
# Muvee runs `docker compose pull && up -d` in the cloned repo, so every service
# must use a pre-built image (no `build:`). The server + worker images come from
# GHCR (built by .github/workflows/docker-image.yml). Muvee publishes the
# `server` service on container port 8080 via its router; Postgres and MinIO stay
# internal. Named volumes persist because Muvee pins compose projects to one node.
#
# Secrets/config are injected as environment variables at deploy time (see
# deploy/muvee/README.md) — none are committed here.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docvault}
      POSTGRES_DB: docvault
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docvault"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${DOCVAULT_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DOCVAULT_S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    image: ${DOCVAULT_IMAGE:-ghcr.io/hoveychen/docvault:latest}
    command: ["/app/bin/server"]
    environment:
      DOCVAULT_HTTP_ADDR: ":8080"
      DOCVAULT_PUBLIC_URL: ${DOCVAULT_PUBLIC_URL}
      DOCVAULT_DATABASE_URL: "postgres://docvault:${POSTGRES_PASSWORD:-docvault}@postgres:5432/docvault?sslmode=disable"
      DOCVAULT_S3_ENDPOINT: "minio:9000"
      DOCVAULT_S3_ACCESS_KEY: ${DOCVAULT_S3_ACCESS_KEY:-minioadmin}
      DOCVAULT_S3_SECRET_KEY: ${DOCVAULT_S3_SECRET_KEY:-minioadmin}
      DOCVAULT_S3_USE_SSL: "false"
      DOCVAULT_TOKEN_ENC_KEY: ${DOCVAULT_TOKEN_ENC_KEY}
      DOCVAULT_JWT_SECRET: ${DOCVAULT_JWT_SECRET}
      DOCVAULT_FEISHU_APP_ID: ${DOCVAULT_FEISHU_APP_ID:-}
      DOCVAULT_FEISHU_APP_SECRET: ${DOCVAULT_FEISHU_APP_SECRET:-}
      DOCVAULT_FEISHU_DOMAIN: ${DOCVAULT_FEISHU_DOMAIN:-feishu}
      DOCVAULT_FEISHU_CONNECTIONS: ${DOCVAULT_FEISHU_CONNECTIONS:-}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${DOCVAULT_IMAGE:-ghcr.io/hoveychen/docvault:latest}
    command: ["/app/bin/worker"]
    environment:
      DOCVAULT_DATABASE_URL: "postgres://docvault:${POSTGRES_PASSWORD:-docvault}@postgres:5432/docvault?sslmode=disable"
      DOCVAULT_S3_ENDPOINT: "minio:9000"
      DOCVAULT_S3_ACCESS_KEY: ${DOCVAULT_S3_ACCESS_KEY:-minioadmin}
      DOCVAULT_S3_SECRET_KEY: ${DOCVAULT_S3_SECRET_KEY:-minioadmin}
      DOCVAULT_S3_USE_SSL: "false"
      DOCVAULT_TOKEN_ENC_KEY: ${DOCVAULT_TOKEN_ENC_KEY}
      DOCVAULT_JWT_SECRET: ${DOCVAULT_JWT_SECRET}
      DOCVAULT_FEISHU_APP_ID: ${DOCVAULT_FEISHU_APP_ID:-}
      DOCVAULT_FEISHU_APP_SECRET: ${DOCVAULT_FEISHU_APP_SECRET:-}
      DOCVAULT_FEISHU_DOMAIN: ${DOCVAULT_FEISHU_DOMAIN:-feishu}
      DOCVAULT_FEISHU_CONNECTIONS: ${DOCVAULT_FEISHU_CONNECTIONS:-}
      DOCVAULT_SYNC_INTERVAL: ${DOCVAULT_SYNC_INTERVAL:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  minio-data:
